{% macro render_pagination(pagination, endpoint, extra_args={}) %}
    {% if pagination.pages > 1 %}
        <nav class="mt-3">
            <ul class="pagination">
                <li class="page-item {% if not pagination.has_prev %}disabled{% endif %}">
                    <a class="page-link" href="{{ url_for(endpoint, page=pagination.prev_num, **extra_args) }}">Назад</a>
                </li>
                {% for page in pagination.iter_pages() %}
                    <li class="page-item {% if page == pagination.page %}active{% endif %}">
                        <a class="page-link" href="{{ url_for(endpoint, page=page, **extra_args) }}">{{ page }}</a>
                    </li>
                {% endfor %}
                <li class="page-item {% if not pagination.has_next %}disabled{% endif %}">
                    <a class="page-link" href="{{ url_for(endpoint, page=pagination.next_num, **extra_args) }}">Вперёд</a>
                </li>
            </ul>
        </nav>
    {% endif %}
{% endmacro %}
